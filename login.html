<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In – JobsPlatform</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="jobbank-theme.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="webhook.js"></script>
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f0f4ff 0%, #faf8f5 100%);
      padding: 24px 16px;
    }
    .auth-box {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 440px;
      padding: 40px 36px;
    }
    .auth-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      margin-bottom: 28px;
    }
    .auth-logo .logo-icon {
      width: 40px; height: 40px;
      background: var(--blue);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 18px;
    }
    .auth-logo span { font-size: 22px; font-weight: 800; color: var(--dark); }
    .auth-tabs {
      display: flex;
      background: #f3f4f6;
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .auth-tab {
      flex: 1;
      padding: 10px;
      border: none;
      background: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
    }
    .auth-tab.active {
      background: #fff;
      color: var(--dark);
      box-shadow: 0 1px 6px rgba(0,0,0,.10);
    }
    .social-btns { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .social-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: #fff;
      font-size: 14px; font-weight: 600; color: var(--dark);
      cursor: pointer;
      transition: border-color .2s, background .2s;
      font-family: inherit;
    }
    .social-btn:hover { border-color: #aaa; background: #fafafa; }
    .social-btn i { font-size: 16px; }
    .divider {
      display: flex; align-items: center; gap: 12px;
      color: var(--muted); font-size: 13px;
      margin-bottom: 20px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: var(--border);
    }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--dark); margin-bottom: 6px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .input-wrap { position: relative; }
    .input-wrap i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; }
    .input-wrap input {
      width: 100%; padding: 12px 14px 12px 38px;
      border: 1.5px solid var(--border); border-radius: 12px;
      font-size: 14px; font-family: inherit; color: var(--dark);
      background: #f7f1e8; outline: none;
      transition: border-color .2s;
      box-sizing: border-box;
    }
    .input-wrap input:focus { border-color: var(--blue); background: #fff; }
    .toggle-pass {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--muted); font-size: 14px;
    }
    .form-msg { font-size: 13px; margin: 8px 0; padding: 10px 14px; border-radius: 10px; display: none; }
    .form-msg.error   { display: block; background: #fef2f2; color: #dc2626; }
    .form-msg.success { display: block; background: #f0fdf4; color: #16a34a; }
    .btn-submit {
      width: 100%; padding: 14px;
      background: var(--dark); color: #fff;
      border: none; border-radius: 14px;
      font-size: 15px; font-weight: 700; font-family: inherit;
      cursor: pointer; margin-top: 4px;
      transition: opacity .2s;
    }
    .btn-submit:hover { opacity: .88; }
    .auth-footer { text-align: center; font-size: 13px; color: var(--muted); margin-top: 20px; }
    .auth-footer a { color: var(--blue); font-weight: 600; }
    .success-view { text-align: center; padding: 20px 0; }
    .success-view .check { font-size: 56px; color: var(--green); margin-bottom: 16px; }
    .success-view h3 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
    .success-view p { color: var(--muted); }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">
        <span class="logo-icon"><i class="fa-solid fa-briefcase"></i></span>
        <span class="logo-text">Jobs<strong>Platform</strong></span>
      </a>
      <nav class="nav-links">
        <a href="jobs.html" data-t="nav_jobs">Jobs</a>
        <a href="jobs.html?tab=companies" data-t="nav_companies">Companies</a>
      </nav>
      <div class="nav-right">
        <span class="lang-btn"><i class="fa-solid fa-globe lang-globe"></i><span class="lang-code">GB</span><span class="lang-label">EN</span><i class="fa-solid fa-chevron-down lang-caret"></i></span>
        <div class="nav-auth-zone" style="display:flex;align-items:center;gap:10px;">
          <a href="login.html" class="btn-ghost" data-t="nav_signin">Sign In</a>
          <a href="login.html?tab=register&role=employer" class="btn-primary" data-t="nav_post">Post a Job</a>
        </div>
      </div>
      <button class="hamburger" id="hamburger"><i class="fa-solid fa-bars"></i></button>
    </div>
    <div class="mobile-menu" id="mobileMenu">
      <a href="jobs.html">Jobs</a>
      <a href="login.html">Sign In</a>
    </div>
  </header>

  <div class="auth-page">
    <div class="auth-box">

      <div class="auth-logo">
        <span class="logo-icon"><i class="fa-solid fa-briefcase"></i></span>
        <span>Jobs<strong>Platform</strong></span>
      </div>

      <!-- TABS -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabSignin"   onclick="switchTab('signin')" data-t="tab_signin">Sign In</button>
        <button class="auth-tab"        id="tabRegister" onclick="switchTab('register')" data-t="tab_reg">Create Account</button>
      </div>

      <!-- ══ SIGN IN ══ -->
      <div id="signinBlock">
        <div class="social-btns">
          <button class="social-btn" onclick="socialLogin('google')">
            <i class="fa-brands fa-google" style="color:#EA4335;"></i> <span data-ui="google_btn">Continue with Google</span>
          </button>
        </div>
        <div class="divider" data-ui="or_signin">or sign in with email</div>

        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>Email</label>
            <div class="input-wrap">
              <i class="fa-regular fa-envelope"></i>
              <input type="email" id="loginEmail" placeholder="you@example.com" required />
            </div>
          </div>
          <div class="form-group">
            <label>Password <a href="#" onclick="showForgot();return false;" style="float:right;font-size:12px;color:var(--blue);font-weight:500;">Forgot?</a></label>
            <div class="input-wrap">
              <i class="fa-solid fa-lock"></i>
              <input type="password" id="loginPassword" placeholder="••••••••" required />
              <button type="button" class="toggle-pass" onclick="togglePass('loginPassword',this)"><i class="fa-solid fa-eye"></i></button>
            </div>
          </div>
          <div class="form-msg" id="loginMsg"></div>
          <button type="submit" class="btn-submit">
            <span id="loginTxt" data-ui="sign_in_btn">Sign In</span>
            <span id="loginSpin" style="display:none;"><i class="fa-solid fa-spinner fa-spin"></i></span>
          </button>
        </form>
        <div class="auth-footer">Don't have an account? <a href="#" onclick="switchTab('register');return false;">Create one free</a></div>
      </div>

      <!-- ══ REGISTER ══ -->
      <div id="registerBlock" style="display:none;">
        <div class="social-btns">
          <button class="social-btn" onclick="socialLogin('google')">
            <i class="fa-brands fa-google" style="color:#EA4335;"></i> <span data-ui="google_btn">Continue with Google</span>
          </button>
        </div>
        <div class="divider" data-ui="or_register">or create account with email</div>

        <div class="form-row">
          <div class="form-group">
            <label>First name</label>
            <div class="input-wrap">
              <i class="fa-regular fa-user"></i>
              <input type="text" id="regFirstName" placeholder="John" required />
            </div>
          </div>
          <div class="form-group">
            <label>Last name</label>
            <div class="input-wrap">
              <i class="fa-regular fa-user"></i>
              <input type="text" id="regLastName" placeholder="Doe" required />
            </div>
          </div>
        </div>
        <div class="form-group">
          <label>Email</label>
          <div class="input-wrap">
            <i class="fa-regular fa-envelope"></i>
            <input type="email" id="regEmail" placeholder="you@example.com" required />
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="regPassword" placeholder="Min. 8 characters" required minlength="8" />
            <button type="button" class="toggle-pass" onclick="togglePass('regPassword',this)"><i class="fa-solid fa-eye"></i></button>
          </div>
        </div>
        <div class="form-msg" id="regMsg"></div>
        <button class="btn-submit" onclick="handleRegister()">
          <span id="regTxt" data-ui="create_account">Create Account</span>
          <span id="regSpin" style="display:none;"><i class="fa-solid fa-spinner fa-spin"></i></span>
        </button>
        <div class="auth-footer">Already have an account? <a href="#" onclick="switchTab('signin');return false;">Sign in</a></div>
      </div>

      <!-- ══ SUCCESS ══ -->
      <div id="successBlock" style="display:none;" class="success-view">
        <div class="check"><i class="fa-solid fa-circle-check"></i></div>
        <h3 id="successTitle">Welcome!</h3>
        <p id="successMsg">Redirecting...</p>
      </div>

    </div>
  </div>

  <script src="site-config.js"></script>
  <script src="i18n.js"></script>
  <script src="main.js"></script>
  <script src="auth.js"></script>
</body>
</html>
